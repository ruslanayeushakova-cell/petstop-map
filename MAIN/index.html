<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStopMap</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="logo">
                <h2>PetStop Map</h2>
            </div>

            <nav class="menu">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">Explore Map</a></li>
                    <li><a href="">About</a></li>
                </ul>
            </nav>

            <button class="btn">Get Started</button>
        </div>
    </header>

    <section class="hero">
    <div class="container hero-inner">
        <div class="hero-content">
            <h1>Discover Pet-Friendly Places Everywhere</h1>
            <p>Find hotels, cafes, restaurants, and coworking spaces that welcome you and your pets. Travel worry-free with PetStop Map.</p>
            
            <div class="hero-btns">
                <button class="btn btn-green">
                    <span class="icon">🔍</span> Explore Map
                </button>
                <button class="btn btn-outline">Learn More</button>
            </div>
        </div>

        <div class="hero-image-container">
            <img src="main.jpg" alt="Corgi" class="main-img">
            
            <div class="stat-card">
                <div class="stat-icon">🐾</div>
                <div class="stat-text">
                    <strong>10,000+</strong>
                    <span>Pet-Friendly Places</span>
                </div>
            </div>
        </div>
    </div>
</section>
    
</body>
</html>
